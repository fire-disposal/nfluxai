# 护理教材 AI 系统配置
# ===========================

# ===========================
# 嵌入模型配置 (国内镜像)
# ===========================
# 推荐模型:
#   - BAAI/bge-large-zh-v1.5    (推荐，效果最好)
#   - BAAI/bge-base-zh-v1.5     (平衡)
#   - shibing624/text2vec-base-chinese (轻量)
embedding_model: "BAAI/bge-large-zh-v1.5"
embedding_device: "cpu"           # 或 "cuda" 使用 GPU
embedding_batch_size: 32

# HuggingFace 镜像 (国内加速)
# 可选: "https://hf-mirror.com" 或留空使用官方源
huggingface_mirror: "https://hf-mirror.com"

# ===========================
# 分块配置
# ===========================
chunk_size: 500                   # 每块最大 token 数
chunk_overlap: 100                # 块重叠

# ===========================
# 检索配置
# ===========================
top_k: 5                          # 默认返回数量
rerank: true                      # 是否启用 Rerank
rerank_model: "BAAI/bge-reranker-large"  # Rerank 模型
rerank_top_n: 20                  # Rerank 筛选数量

# ===========================
# LLM 配置 - DeepSeek API
# ===========================
llm:
  provider: "deepseek"
  model: "deepseek-chat"          # 或 "deepseek-reasoner" for R1
  api_key: ""                     # 从环境变量 DEEPSEEK_API_KEY 读取
  api_base: "https://api.deepseek.com/v1/chat/completions"
  temperature: 0.7
  max_tokens: 2048

# ===========================
# 备选 LLM 配置
# ===========================
# 如需使用其他 LLM，取消注释相应配置:

# Ollama 本地模型 (无需 API Key)
# llm:
#   provider: "ollama"
#   model: "qwen2.5:7b"
#   temperature: 0.7
#   max_tokens: 2048

# 智谱 GLM
# llm:
#   provider: "zhipu"
#   model: "glm-4-flash"
#   api_key: ""
#   api_base: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
#   temperature: 0.7
#   max_tokens: 2048

# 通义千问
# llm:
#   provider: "qwen"
#   model: "qwen-turbo"
#   api_key: ""
#   api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
#   temperature: 0.7
#   max_tokens: 2048

# ===========================
# 环境变量说明
# ===========================
# DEEPSEEK_API_KEY: DeepSeek API 密钥
# ZHIPU_API_KEY: 智谱 API 密钥
# DASHSCOPE_API_KEY: 阿里云 DashScope API 密钥
# HF_ENDPOINT: HuggingFace 镜像地址 (覆盖 huggingface_mirror)