# 护理教材 AI 系统配置（统一 API 服务结构）

# ===========================
# 文本分块配置
# ===========================
chunk_size: 500
chunk_overlap: 100

# ===========================
# 检索配置
# ===========================
top_k: 5

# ===========================
# API 服务统一配置
# ===========================
api_services:
  llm:
    provider: "deepseek"
    model: "deepseek-chat"
    api_url: "https://api.deepseek.com/v1/chat/completions"
    api_key: ""
    api_key_env: "DEEPSEEK_API_KEY"
    temperature: 0.7
    max_tokens: 2048
    timeout: 120

  embedding:
    provider: "siliconflow"
    model: "BAAI/bge-m3"
    api_url: "https://api.siliconflow.example/v1/embeddings"  # 替换为真实地址
    api_key: ""
    api_key_env: "SILICON_FLOW_API_KEY"
    timeout: 120
    batch_size: 32

  rerank:
    enabled: true
    provider: "http"
    model: "BAAI/bge-reranker-large"
    api_url: ""  # 例如: https://rerank.example/v1/rank
    api_key: ""
    api_key_env: "RERANK_API_KEY"
    timeout: 30
    top_n: 20
