# 护理教材 AI 系统配置

# ===========================
# 嵌入模型配置
# ===========================
embedding_model: "text2vec-base-chinese"
embedding_device: "cpu"
embedding_batch_size: 32

# ===========================
# 分块配置
# ===========================
chunk_size: 500        # 每块最大 token 数
chunk_overlap: 100     # 块之间重叠

# ===========================
# 检索配置
# ===========================
top_k: 5               # 默认返回数量
rerank: true           # 是否启用 Rerank
rerank_model: "bge-reranker-base"
rerank_top_n: 20       # Rerank 初筛数量

# ===========================
# LLM 配置
# ===========================
llm:
  # 提供商：ollama / openai / deepseek / zhipu
  provider: "ollama"
  
  # Ollama 本地模型
  model: "qwen2.5:7b"
  
  # API 配置 (如使用 API 提供商)
  api_key: ""          # 或从环境变量 LLM_API_KEY 读取
  api_base: ""         # 自定义 API 地址
  
  # 生成参数
  temperature: 0.7
  max_tokens: 2048

# ===========================
# 环境变量说明
# ===========================
# LLM_PROVIDER: 覆盖 provider 设置
# LLM_MODEL: 覆盖 model 设置
# LLM_API_KEY: API 密钥
# LLM_API_BASE: 自定义 API 地址
